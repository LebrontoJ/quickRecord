<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记录详情 - Quick Record</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="record-body">
    <main class="record-page">
      <article class="record-shell">
        <div class="detail-topbar">
          <button class="secondary-button" id="backToMain" type="button">返回主页面</button>
          <div class="detail-actions">
            <button class="secondary-button" id="copyButton" type="button">复制文字</button>
            <button class="secondary-button" id="editRecordButton" type="button">编辑记录</button>
          </div>
        </div>
        <div id="recordContent" class="detail-content">
          <div class="empty-state">正在加载记录</div>
        </div>
      </article>
    </main>
    <script src="/record.js" type="module"></script>
  </body>
</html>
