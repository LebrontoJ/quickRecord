<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Record</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-panel" aria-label="记录编辑器">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Quick Record</p>
            <h1>每日活动记录</h1>
          </div>
          <button class="icon-button" id="refreshButton" type="button" title="刷新记录">↻</button>
        </div>

        <form id="entryForm" class="entry-form">
          <input type="hidden" id="entryId" />

          <label>
            <span>时间</span>
            <input id="occurredAt" name="occurredAt" type="datetime-local" required />
          </label>

          <div class="form-grid">
            <label>
              <span>类型</span>
              <select id="activityType" name="activityType" required>
                <option value="coding">刷题心得</option>
                <option value="fitness">健身记录</option>
                <option value="reading">阅读学习</option>
                <option value="life">生活</option>
                <option value="other">其他</option>
              </select>
            </label>

            <label>
              <span>标题</span>
              <input id="title" name="title" type="text" placeholder="比如：二分查找复盘 / 背腿训练" required />
            </label>
          </div>

          <label>
            <span>正文</span>
            <textarea id="content" name="content" rows="7" placeholder="写下今天的思路、动作、重量、感受或下一步计划"></textarea>
          </label>

          <div class="metrics-grid">
            <label>
              <span>题目数</span>
              <input id="problemCount" type="number" min="0" placeholder="0" />
            </label>
            <label>
              <span>训练分钟</span>
              <input id="workoutMinutes" type="number" min="0" placeholder="0" />
            </label>
            <label>
              <span>体重 kg</span>
              <input id="bodyWeight" type="number" min="0" step="0.1" placeholder="0" />
            </label>
          </div>

          <label class="file-box">
            <span>图片</span>
            <input id="images" name="images" type="file" accept="image/*" multiple />
          </label>

          <div class="form-actions">
            <button class="secondary-button" id="resetButton" type="button">清空</button>
            <button class="primary-button" type="submit">保存记录</button>
          </div>
        </form>
      </section>

      <section class="timeline-panel" aria-label="时间线">
        <div class="filters">
          <label>
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="标题或正文" />
          </label>
          <label>
            <span>筛选</span>
            <select id="filterType">
              <option value="all">全部类型</option>
              <option value="coding">刷题心得</option>
              <option value="fitness">健身记录</option>
              <option value="reading">阅读学习</option>
              <option value="life">生活</option>
              <option value="other">其他</option>
            </select>
          </label>
          <label>
            <span>开始</span>
            <input id="startDate" type="date" />
          </label>
          <label>
            <span>结束</span>
            <input id="endDate" type="date" />
          </label>
        </div>

        <div class="summary-strip">
          <div>
            <span id="totalCount">0</span>
            <small>条记录</small>
          </div>
          <div>
            <span id="codingCount">0</span>
            <small>刷题</small>
          </div>
          <div>
            <span id="fitnessCount">0</span>
            <small>健身</small>
          </div>
        </div>

        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <template id="entryTemplate">
      <article class="entry-card">
        <div class="entry-card-header">
          <div>
            <time></time>
            <h2></h2>
          </div>
          <span class="type-pill"></span>
        </div>
        <p class="entry-content"></p>
        <div class="metric-row"></div>
        <div class="image-grid"></div>
        <div class="card-actions">
          <button type="button" data-action="edit">编辑</button>
          <button type="button" data-action="delete">删除</button>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
